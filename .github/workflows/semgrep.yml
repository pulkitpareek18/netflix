name: Semgrep

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/secrets \
            --exclude '*.min.js' \
            --exclude '*.gif' \
            --exclude '*.avif' \
            --exclude '*.jpg' \
            --exclude '*.png' \
            --sarif \
            --output semgrep.sarif \
            .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
